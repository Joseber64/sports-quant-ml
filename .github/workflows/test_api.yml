name: Test Odds API

on:
  workflow_dispatch:   # lo puedes lanzar manualmente desde GitHub

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install requests
      run: pip install requests

    - name: Run test_api.py with secret
      run: python src/test_api.py
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
