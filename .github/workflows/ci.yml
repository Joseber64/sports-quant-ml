name: Sports Quant ML Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas scikit-learn joblib requests

    # Paso 1: Testear la API con tu key
    - name: Test Odds API key
      run: python src/test_api.py

    # Paso 2: Descargar datos en vivo
    - name: Run data pipeline (Odds API)
      run: python src/main.py

    # Paso 3: Entrenar modelo con CSV históricos
    - name: Train model with historical CSVs
      run: python src/train.py

    # Paso 4: Predecir con datos nuevos
    - name: Predict with new Odds data
      run: python src/predict.py || true

    # Paso 5: Guardar outputs en el repo
    - name: Commit outputs
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add data/*.csv models/*.pkl
        git commit -m "Update data, train model, and predictions" || echo "No changes to commit"
        git pull --rebase origin main || true
        git push origin main
