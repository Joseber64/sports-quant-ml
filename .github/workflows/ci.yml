name: Sports Quant ML Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas scikit-learn joblib requests

    - name: Run data pipeline
      run: python src/main.py

    - name: Train model
      run: python src/train.py

    - name: Predict with new data
      run: python src/predict.py || true

    - name: Commit outputs
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add data/*.csv models/*.pkl
        git commit -m "Update data, train model, and predictions" || echo "No changes to commit"
        git pull --rebase origin main || true
        git push origin main
