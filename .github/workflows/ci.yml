name: Sports Quant ML Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas scikit-learn joblib requests

    - name: Test Odds API key
      run: python src/test_api.py
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    - name: Run data pipeline (Odds API)
      run: python src/main.py
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    - name: Train model with historical CSVs
      run: python src/train.py

    - name: Predict with new Odds data
      run: python src/predict.py || true
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    - name: Send Telegram Picks
      run: python src/send_telegram.py
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: Commit outputs
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add data/*.csv models/*.pkl
        git commit -m "Update data, train model, and predictions" || echo "No changes to commit"
        git pull --rebase origin main || true
        git push origin main
