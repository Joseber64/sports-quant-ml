```yaml
name: Sports Quant ML Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo (no credentials persisted)
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib requests

    - name: Test Odds API key
      run: python src/test_api.py
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    - name: Run data pipeline (Odds API)
      run: python src/main.py
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    - name: Train model with historical CSVs
      run: python src/train.py

    - name: Predict with new Odds data
      run: python src/predict.py || true
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    - name: Send Telegram Picks
      run: python src/send_telegram.py
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: Prepare commit (only allowed paths)
      id: prepare
      run: |
        set -e
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        # Añadir solo los archivos/carpetas permitidos
        git add data/*.csv models/*.pkl || true

        # Si no hay cambios, marcar y salir
        if git diff --cached --quiet; then
          echo "no_changes=true" >> $GITHUB_OUTPUT
        else
          # Crear un branch único y hacer commit local
          BRANCH="ci-outputs/$(date +'%Y%m%d_%H%M%S')-${GITHUB_RUN_ID}"
          git commit -m "ci: update data and models [automated]" || true
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "no_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Push branch using GH_PAT
      if: steps.prepare.outputs.no_changes == 'false'
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        set -e
        BRANCH="${{ steps.prepare.outputs.branch }}"
        if [ -z "$BRANCH" ]; then
          echo "Branch name not set, aborting."
          exit 1
        fi

        # Configurar remote con PAT (no se imprime en logs)
        REMOTE="https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
        git remote set-url origin "$REMOTE"

        # Crear y push de la rama
        git checkout -b "$BRANCH"
        git push origin "$BRANCH" --force

    - name: Create Pull Request (from pushed branch)
      if: steps.prepare.outputs.no_changes == 'false'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GH_PAT }}
        commit-message: "ci: update data and models [automated]"
        branch: ${{ steps.prepare.outputs.branch }}
        title: "ci: update data and models [automated]"
        body: "Automated update of data and models by CI pipeline."
        base: main
        labels: "ci-outputs"

    - name: Cleanup (always)
      if: always()
      run: |
        # Restaurar origin a URL pública (sin exponer token)
        git remote set-url origin "https://github.com/${{ github.repository }}.git" || true
```
