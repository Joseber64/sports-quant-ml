name: AI Auto-Fix Copilot
on:
  workflow_dispatch: # Esto añade un botón de "Play" manual
  push:
    branches: [main] # Se ejecuta cada vez que guardas algo en la rama principal

  pull_request:
    branches: [main]

jobs:
  ai-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Crucial para que la IA pueda "editar" y subir el código
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }} # Extrae el código de la rama actual

      - name: AI Code Review and Fix
        uses: presubmit/ai-code-review-action@v1 # Ejemplo de acción del Marketplace
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          auto_fix: true # Esta opción le indica que intente reparar errores

      - name: Commit & Push changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "AI Copilot: correcciones automáticas aplicadas" || echo "No hay cambios"
          git push
